services:
  todo-blue:
    image: todo-app:latest
    container_name: sw_team_1-blue
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080

  todo-green:
    image: todo-app:latest
    container_name: sw_team_1-green
    ports:
      - "8081:8080"
    environment:
      - SERVER_PORT=8080

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8002:8002"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - todo-blue
